name: Publish test report

on:
  workflow_run:
    workflows: [Playwright Nightly (full regression)]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    name: Deploy HTML report to GitHub Pages
    if: github.event.workflow_run.conclusion != 'cancelled'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download chromium nightly report
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: nightly-report-chromium
          path: site

      - name: Prepare Pages site
        run: |
          if [ ! -f site/index.html ]; then
            echo "No HTML report found — skipping deploy"
            exit 1
          fi
          cat > site/README.md <<'EOF'
          # Playwright nightly report

          Open [index.html](./index.html) for the latest Chromium regression report.

          Generated by GitHub Actions from the nightly workflow.
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
