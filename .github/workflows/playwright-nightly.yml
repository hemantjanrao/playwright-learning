name: Playwright Nightly (full regression)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_env:
        description: Target environment
        required: false
        default: dev
        type: choice
        options: [dev, qa, staging]
      shard_total:
        description: Shards per browser project (API always runs as 1/1)
        required: false
        default: '2'
        type: choice
        options: ['1', '2', '3', '4']

concurrency:
  group: nightly-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  TEST_ENV: ${{ github.event.inputs.test_env || 'dev' }}
  HEADLESS: true
  CI: true
  CI_TIER: nightly
  PLAYWRIGHT_BLOB_REPORT: true

jobs:
  build-matrix:
    name: Build shard matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        env:
          SHARD_TOTAL: ${{ github.event.inputs.shard_total || '2' }}
        run: |
          INCLUDE='[{"project":"api","shardIndex":1,"shardTotal":1}'
          for project in chromium firefox webkit; do
            for ((shard=1; shard<=SHARD_TOTAL; shard++)); do
              INCLUDE+=",{\"project\":\"$project\",\"shardIndex\":$shard,\"shardTotal\":$SHARD_TOTAL}"
            done
          done
          INCLUDE+=']'
          echo "matrix={\"include\":${INCLUDE}}" >> "$GITHUB_OUTPUT"

  regression:
    name: Regression (${{ matrix.project }} ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: build-matrix
    environment: ${{ github.event.inputs.test_env || 'dev' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-playwright
        with:
          browsers: all
      - uses: ./.github/actions/configure-test-env
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      - name: Run regression shard
        run: >-
          npx playwright test
          --project=${{ matrix.project }}
          --grep @regression
          --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      - uses: ./.github/actions/upload-playwright-artifacts
        if: failure()
        with:
          report-name: nightly-report-${{ matrix.project }}-${{ matrix.shardIndex }}-${{ matrix.shardTotal }}
          results-name: nightly-results-${{ matrix.project }}-${{ matrix.shardIndex }}-${{ matrix.shardTotal }}
      - name: Upload blob report for merge
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-blob-${{ matrix.project }}-${{ matrix.shardIndex }}-${{ matrix.shardTotal }}
          path: reports/blob/
          retention-days: 14
          if-no-files-found: ignore

  merge-reports:
    name: Merge sharded reports
    runs-on: ubuntu-latest
    needs: regression
    if: always() && needs.regression.result != 'cancelled'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-playwright
      - name: Download blob reports from all shards
        uses: actions/download-artifact@v8
        with:
          pattern: nightly-blob-*
          merge-multiple: true
          path: reports/blob
      - name: Merge into HTML report
        run: |
          if ! find reports/blob -type f \( -name '*.zip' -o -name '*.jsonl' \) -print -quit | grep -q .; then
            echo "No blob reports found — skipping merge"
            exit 0
          fi
          npx playwright merge-reports --reporter html reports/blob
          mkdir -p reports/html
          cp -R playwright-report/* reports/html/
      - name: Upload merged HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-report-merged
          path: reports/html/
          retention-days: 30
          if-no-files-found: ignore

  publish-pages:
    name: Deploy HTML report to GitHub Pages
    runs-on: ubuntu-latest
    needs: merge-reports
    if: >-
      always() &&
      needs.merge-reports.result != 'cancelled' &&
      vars.ENABLE_GITHUB_PAGES == 'true'
    permissions:
      contents: read
      actions: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download merged nightly report
        uses: actions/download-artifact@v8
        with:
          name: nightly-report-merged
          path: site

      - name: Prepare Pages site
        run: |
          if [ ! -f site/index.html ]; then
            echo "No HTML report found — skipping deploy"
            exit 1
          fi
          cat > site/README.md <<'EOF'
          # Playwright nightly report

          Open [index.html](./index.html) for the merged regression report (all shards).

          Generated by GitHub Actions from the nightly workflow.
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  nightly-summary:
    name: Nightly summary
    runs-on: ubuntu-latest
    needs: [regression, merge-reports, publish-pages]
    if: always()
    steps:
      - name: Write job summary
        run: |
          {
            echo "## Nightly regression"
            echo ""
            echo "| Input | Value |"
            echo "|-------|-------|"
            echo "| Environment | \`${{ env.TEST_ENV }}\` |"
            echo "| Trigger | \`${{ github.event_name }}\` |"
            echo "| Shards per browser | \`${{ github.event.inputs.shard_total || '2' }}\` |"
            echo "| Matrix | api (1/1) · chromium · firefox · webkit (sharded) |"
            echo ""
            echo "### Reports"
            echo "- **nightly-report-merged** — combined HTML from all shards"
            echo "- **nightly-report-*-*** — per-shard HTML on failure"
            echo "- **nightly-blob-*** — raw blobs (used internally for merge)"
            echo "- Chromium dashboard: published to GitHub Pages when \`ENABLE_GITHUB_PAGES=true\`"
          } >> "$GITHUB_STEP_SUMMARY"
