name: Playwright Nightly (full regression)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_env:
        description: Target environment
        required: false
        default: dev
        type: choice
        options: [dev, qa, staging]

concurrency:
  group: nightly-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  TEST_ENV: ${{ github.event.inputs.test_env || 'dev' }}
  HEADLESS: true
  CI: true
  CI_TIER: nightly

jobs:
  regression:
    name: Regression (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ github.event.inputs.test_env || 'dev' }}
    strategy:
      fail-fast: false
      matrix:
        project: [api, chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-playwright
        with:
          browsers: all
      - uses: ./.github/actions/configure-test-env
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      - run: npx playwright test --project=${{ matrix.project }} --grep @regression
      - uses: ./.github/actions/upload-playwright-artifacts
        if: always()
        with:
          report-name: nightly-report-${{ matrix.project }}
          results-name: nightly-results-${{ matrix.project }}
          upload-report: always

  publish-pages:
    name: Deploy HTML report to GitHub Pages
    runs-on: ubuntu-latest
    needs: regression
    if: always() && needs.regression.result != 'cancelled'
    permissions:
      contents: read
      actions: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download chromium nightly report
        uses: actions/download-artifact@v8
        with:
          name: nightly-report-chromium
          path: site

      - name: Prepare Pages site
        run: |
          if [ ! -f site/index.html ]; then
            echo "No HTML report found — skipping deploy"
            exit 1
          fi
          cat > site/README.md <<'EOF'
          # Playwright nightly report

          Open [index.html](./index.html) for the latest Chromium regression report.

          Generated by GitHub Actions from the nightly workflow.
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  nightly-summary:
    name: Nightly summary
    runs-on: ubuntu-latest
    needs: [regression, publish-pages]
    if: always()
    steps:
      - name: Write job summary
        run: |
          {
            echo "## Nightly regression"
            echo ""
            echo "| Input | Value |"
            echo "|-------|-------|"
            echo "| Environment | \`${{ env.TEST_ENV }}\` |"
            echo "| Trigger | \`${{ github.event_name }}\` |"
            echo "| Matrix | api, chromium, firefox, webkit |"
            echo ""
            echo "### Reports"
            echo "- Download **nightly-report-*** artifacts from this run"
            echo "- Chromium HTML dashboard: published to GitHub Pages by the **Deploy HTML report** job"
          } >> "$GITHUB_STEP_SUMMARY"
