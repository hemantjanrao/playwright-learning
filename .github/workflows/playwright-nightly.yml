name: Playwright Nightly (full regression)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_env:
        description: Target environment
        required: false
        default: dev
        type: choice
        options: [dev, qa, staging]

env:
  TEST_ENV: ${{ github.event.inputs.test_env || 'dev' }}
  HEADLESS: true
  CI: true
  CI_TIER: nightly

jobs:
  regression:
    name: Full regression (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        project: [api, chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npx playwright test --project=${{ matrix.project }} --grep @regression
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://www.saucedemo.com' }}
          API_BASE_URL: ${{ secrets.API_BASE_URL || 'https://jsonplaceholder.typicode.com' }}
          E2E_USERNAME: ${{ secrets.E2E_USERNAME || 'standard_user' }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD || 'secret_sauce' }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-report-${{ matrix.project }}
          path: reports/html/
          retention-days: 14

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-results-${{ matrix.project }}
          path: test-results/
          retention-days: 7
