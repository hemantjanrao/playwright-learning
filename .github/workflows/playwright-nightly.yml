name: Playwright Nightly (full regression)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_env:
        description: Target environment
        required: false
        default: dev
        type: choice
        options: [dev, qa, staging]

concurrency:
  group: nightly-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  TEST_ENV: ${{ github.event.inputs.test_env || 'dev' }}
  HEADLESS: true
  CI: true
  CI_TIER: nightly

jobs:
  regression:
    name: Regression (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ github.event.inputs.test_env || 'dev' }}
    strategy:
      fail-fast: false
      matrix:
        project: [api, chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-playwright
        with:
          browsers: all
      - uses: ./.github/actions/configure-test-env
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      - run: npx playwright test --project=${{ matrix.project }} --grep @regression
      - uses: ./.github/actions/upload-playwright-artifacts
        if: always()
        with:
          report-name: nightly-report-${{ matrix.project }}
          results-name: nightly-results-${{ matrix.project }}
          upload-report: always

  nightly-summary:
    name: Nightly summary
    runs-on: ubuntu-latest
    needs: regression
    if: always()
    steps:
      - name: Write job summary
        run: |
          {
            echo "## Nightly regression"
            echo ""
            echo "| Input | Value |"
            echo "|-------|-------|"
            echo "| Environment | \`${{ env.TEST_ENV }}\` |"
            echo "| Trigger | \`${{ github.event_name }}\` |"
            echo "| Matrix | api, chromium, firefox, webkit |"
            echo ""
            echo "### Reports"
            echo "- Download **nightly-report-*** artifacts from this run"
            echo "- Published dashboard updates via **Publish test report** workflow (GitHub Pages)"
          } >> "$GITHUB_STEP_SUMMARY"
