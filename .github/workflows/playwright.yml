name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      test_env:
        description: Target environment (dev, qa, staging)
        required: false
        default: dev
        type: choice
        options:
          - dev
          - qa
          - staging
      browser:
        description: Browser project to run
        required: false
        default: chromium
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - all

env:
  TEST_ENV: ${{ github.event.inputs.test_env || 'dev' }}
  HEADLESS: true
  CI: true

jobs:
  test:
    name: Playwright (${{ matrix.project || 'chromium' }}) — ${{ github.event.inputs.test_env || 'dev' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        project: ${{ github.event.inputs.browser == 'all' && fromJSON('["chromium","firefox","webkit"]') || fromJSON(format('["{0}"]', github.event.inputs.browser || 'chromium')) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run Playwright tests
        run: npx playwright test --project=${{ matrix.project }}
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report-${{ matrix.project }}
          path: reports/html/
          retention-days: 14

      - name: Upload test results (traces, videos, screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ matrix.project }}
          path: test-results/
          retention-days: 7
